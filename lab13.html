<!DOCTYPE html>
<html>
<head>
    <title>Registration/Login Form</title>
   <style>
    /* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Body styling */
body {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container */
.container {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    width: 700px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    text-align: center;
}

.container h2 {
    margin-bottom: 20px;
}

/* Form box (flex layout) */
.form-box {
    display: flex;
    justify-content: space-between;
    gap: 20px;
}

/* Individual forms */
.register, .login {
    width: 48%;
    text-align: left;
}

/* Headings */
h3 {
    margin-bottom: 10px;
}

/* Inputs */
input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

/* Gender section */
.gender {
    margin: 8px 0;
}

.gender label {
    margin-right: 10px;
}

/* Checkbox label */
label {
    display: block;
    margin: 8px 0;
    font-size: 14px;
}

/* Buttons */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007bff;
}

/* Responsive design */
@media (max-width: 768px) {
    .form-box {
        flex-direction: column;
    }

    .register, .login {
        width: 100%;
    }
}
   </style>
</head>
<body>

<div class="container">
    <h2>REGISTRATION / LOGIN FORM</h2>

    <div class="form-box">

        <!-- Registration Form -->
        <div class="register">
            <h3>Register Form :</h3>

            <input type="text" placeholder="Username">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">

            <div class="gender">
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Male</label>
            </div>

            <label>
                <input type="checkbox"> I have read and accept terms of use
            </label>

            <button>Register</button>
        </div>

        <!-- Login Form -->
        <div class="login">
            <h3>Login Form :</h3>

            <input type="text" placeholder="Enter Your Email">
            <input type="password" placeholder="Password">

            <label>
                <input type="checkbox"> Remember me
            </label>

            <button>Login</button>
        </div>

    </div>
</div>

</body>
</html>
