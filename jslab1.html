<!DOCTYPE html>
<html>
<head>
    <title>Types of JavaScript</title>

    <!-- Internal JavaScript -->
    <script>
        function internalJS() {
            alert("This is Internal JavaScript");
        }
    </script>
</head>
<body>

    <!-- Inline JavaScript -->
    <button onclick="alert('This is Inline JavaScript')">
        Inline JS
    </button>

    <button onclick="internalJS()">
        Internal JS
    </button>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</body>
</html>
