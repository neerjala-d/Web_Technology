<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>
</head>
<body>

<p id="p1">First Paragraph</p>
<p id="p2">Second Paragraph</p>
<p id="p3">Third Paragraph</p>
<p id="p4">Fourth Paragraph</p>

<script>

// a. Get first paragraph
let firstPara = document.querySelector("p");
console.log(firstPara);

// b. Get paragraphs by id
let para1 = document.querySelector("#p1");
let para2 = document.querySelector("#p2");
let para3 = document.querySelector("#p3");
let para4 = document.querySelector("#p4");

// c. Get all paragraphs
let allPara = document.querySelectorAll("p");

// d. Loop through nodeList
allPara.forEach(function(p){
    console.log(p.textContent);
});

// e. Set text content of fourth paragraph
para4.textContent = "Fourth Paragraph";

// f. Set id and class attributes
allPara.forEach(function(p,index){
    p.setAttribute("class","paragraph");
});

// g. Change style
allPara.forEach(function(p){
    p.style.color = "blue";
    p.style.backgroundColor = "lightgray";
    p.style.border = "1px solid black";
    p.style.fontSize = "20px";
    p.style.fontFamily = "Arial";
});

// h. First & third green, second & fourth red
allPara.forEach(function(p,index){
    if(index==0 || index==2)
    {
        p.style.color = "green";
    }
    else
    {
        p.style.color = "red";
    }
});

// i. Set text, id and class
allPara.forEach(function(p,index){
    p.textContent = "Paragraph " + (index+1);
    p.id = "newId" + (index+1);
    p.className = "newClass";
});

</script>

</body>
</html>
