<!DOCTYPE html>
<html>
<body>

<script>
let a = parseInt(prompt("Enter first integer:"));
let b = parseInt(prompt("Enter second integer:"));

if(a > b)
{
    document.write("Larger Number = " + a + "<br>");
    document.write("Smaller Number = " + b);
}
else
{
    document.write("Larger Number = " + b + "<br>");
    document.write("Smaller Number = " + a);
}
</script>

</body>
</html>
